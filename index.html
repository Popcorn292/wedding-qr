<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Cinematic Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:black;
    color:white;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* Section */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    position:relative;
}

h1{
    font-family:'Cinzel',serif;
    font-size:42px;
    letter-spacing:3px;
    opacity:0;
    transform:translateY(40px);
    transition:2s ease;
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* Backgrounds */
.bg1{background:black;}
.bg2{background:linear-gradient(to bottom,#000,#2a0000);}
.bg3{background:black;}
.bg4{background:radial-gradient(circle,#ffcc66,#000);}
.bg5{background:black;}

/* Glitch effect */
.glitch{
    position:relative;
}
.glitch:before,
.glitch:after{
    content:attr(data-text);
    position:absolute;
    left:0;
    width:100%;
}
.glitch:before{
    color:red;
    animation:glitch 0.8s infinite;
}
.glitch:after{
    color:blue;
    animation:glitch 0.8s infinite reverse;
}

@keyframes glitch{
    0%{clip-path:inset(0 0 90% 0)}
    50%{clip-path:inset(10% 0 50% 0)}
    100%{clip-path:inset(80% 0 0 0)}
}

/* Flash */
.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    top:0;
    left:0;
    opacity:0;
    pointer-events:none;
}

/* Names */
.names{
    font-size:55px;
    color:#ffcc66;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #ffcc66;}
    to{text-shadow:0 0 40px #ffcc66;}
}

/* Countdown */
#countdown{
    margin-top:20px;
    font-size:24px;
    letter-spacing:2px;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<section class="bg1">
<h1>In a world... where love was never predictable.</h1>
</section>

<section class="bg2">
<h1 class="glitch" data-text="They fought. They doubted.">They fought. They doubted.</h1>
</section>

<section class="bg3">
<h1>They almost lost each other...</h1>
</section>

<section class="bg4">
<h1>But destiny rewrote their story.</h1>
</section>

<section class="bg5">
<div>
<div class="names">ANH & EM</div>
<div id="countdown"></div>
</div>
</section>

<audio id="bgMusic" autoplay loop muted playsinline>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const sections=document.querySelectorAll("h1");
const flash=document.getElementById("flash");
const music=document.getElementById("bgMusic");

/* Reveal on scroll */
window.addEventListener("scroll",()=>{
    sections.forEach(el=>{
        const rect=el.getBoundingClientRect();
        if(rect.top < window.innerHeight - 100){
            el.classList.add("show");
        }
    });
});

/* Flash at twist */
window.addEventListener("scroll",()=>{
    const bg4=document.querySelector(".bg4");
    const rect=bg4.getBoundingClientRect();
    if(rect.top < window.innerHeight/2){
        flash.style.opacity=1;
        setTimeout(()=>flash.style.opacity=0,150);
    }
});

/* Music auto fade in */
window.addEventListener("load",()=>{
    music.volume=0;
    music.play().then(()=>{
        setTimeout(()=>{
            music.muted=false;
            let v=0;
            const fade=setInterval(()=>{
                if(v<1){
                    v+=0.05;
                    music.volume=v;
                }else clearInterval(fade);
            },200);
        },1500);
    }).catch(()=>{});
});

/* Countdown */
const weddingDate=new Date("Dec 24, 2026 00:00:00").getTime();
setInterval(()=>{
    const now=new Date().getTime();
    const distance=weddingDate-now;
    const days=Math.floor(distance/(1000*60*60*24));
    document.getElementById("countdown").innerHTML=
    "Wedding Day In "+days+" Days";
},1000);
</script>

</body>
</html>
