<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Final Chapter</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:black;
    color:white;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* Fullscreen scenes */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    position:relative;
}

h1{
    font-family:'Cinzel',serif;
    font-size:38px;
    letter-spacing:2px;
}

/* Scene backgrounds */
.scene1{background:black;}
.scene2{background:linear-gradient(to bottom,#000,#200000);}
.scene3{background:black;}
.scene4{background:radial-gradient(circle,#ffcc66,black);}
.scene5{background:black;}

/* Fade */
.fade{
    opacity:0;
    transform:translateY(20px);
    transition:all 2s ease;
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* Flash effect */
.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    top:0;
    left:0;
    opacity:0;
    pointer-events:none;
}

.names{
    font-size:50px;
    color:#ffcc66;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #ffcc66;}
    to{text-shadow:0 0 30px #ffcc66;}
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<section class="scene1">
    <h1 class="fade">In a world where love was never predictable...</h1>
</section>

<section class="scene2">
    <h1 class="fade">They fought. They doubted. They almost gave up.</h1>
</section>

<section class="scene3">
    <h1 class="fade">But destiny had another plan.</h1>
</section>

<section class="scene4">
    <h1 class="fade">And then... He knelt down.</h1>
</section>

<section class="scene5">
    <div class="names fade">ANH & EM</div>
</section>

<audio id="bgMusic" autoplay loop muted playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const fades=document.querySelectorAll('.fade');
const flash=document.getElementById('flash');
const music=document.getElementById('bgMusic');

/* Scroll reveal */
window.addEventListener('scroll',()=>{
    fades.forEach(el=>{
        const rect=el.getBoundingClientRect();
        if(rect.top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});

/* Flash when proposal appears */
window.addEventListener('scroll',()=>{
    const scene4=document.querySelector('.scene4');
    const rect=scene4.getBoundingClientRect();
    if(rect.top < window.innerHeight/2){
        flash.style.opacity=1;
        setTimeout(()=>flash.style.opacity=0,200);
    }
});

/* Epic music fade in */
window.addEventListener("load",()=>{
    music.volume=0;
    music.play().then(()=>{
        setTimeout(()=>{
            music.muted=false;
            let v=0;
            const fade=setInterval(()=>{
                if(v<1){
                    v+=0.05;
                    music.volume=v;
                }else clearInterval(fade);
            },200);
        },1500);
    }).catch(()=>{});
});
</script>

</body>
</html>
