<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Love Saga</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:black;
    color:white;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* Section full màn hình */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    position:relative;
}

/* Scene 1 */
.scene1{
    background:black;
}

.scene1 h1{
    font-family:'Cinzel',serif;
    font-size:32px;
    opacity:0;
    animation:fadeIn 3s forwards 1s;
}

/* Scene 2 */
.scene2{
    background:linear-gradient(to bottom, black, #2c0000);
}

.scene2 h1{
    font-size:40px;
    color:#ffcc66;
    animation:glow 2s infinite alternate;
}

/* Scene 3 */
.scene3{
    background:linear-gradient(to bottom, #000000, #111111);
}

.timeline{
    max-width:400px;
}

.timeline p{
    margin:20px 0;
    opacity:0;
    animation:fadeIn 2s forwards;
}

.timeline p:nth-child(1){animation-delay:1s;}
.timeline p:nth-child(2){animation-delay:2s;}
.timeline p:nth-child(3){animation-delay:3s;}
.timeline p:nth-child(4){animation-delay:4s;}

/* Scene 4 */
.scene4{
    background:radial-gradient(circle, #ffcc66, black);
}

.scene4 h1{
    font-size:42px;
    font-family:'Cinzel',serif;
}

/* Scene 5 */
.scene5{
    background:black;
}

.names{
    font-size:48px;
    font-family:'Cinzel',serif;
    animation:glow 2s infinite alternate;
}

@keyframes fadeIn{
    to{opacity:1;}
}

@keyframes glow{
    from{text-shadow:0 0 10px #ffcc66;}
    to{text-shadow:0 0 25px #ffcc66;}
}
</style>
</head>

<body>

<section class="scene1">
    <h1>In a world where nothing was planned...</h1>
</section>

<section class="scene2">
    <h1>Two souls collided.</h1>
</section>

<section class="scene3">
    <div class="timeline">
        <p>The First Meeting</p>
        <p>The First Fight</p>
        <p>The Forgiveness</p>
        <p>The Proposal</p>
    </div>
</section>

<section class="scene4">
    <h1>And then... She said YES.</h1>
</section>

<section class="scene5">
    <div class="names">ANH & EM</div>
</section>

</body>
</html>
