<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: 'Segoe UI', sans-serif;
    height:100vh;
    background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* Overlay */
.overlay{
    background:rgba(0,0,0,0.6);
    padding:45px;
    border-radius:30px;
    text-align:center;
    width:90%;
    max-width:420px;
    backdrop-filter:blur(10px);
    animation:fadeIn 2s ease;
}

.overlay h2{
    margin-bottom:25px;
    font-size:28px;
    letter-spacing:1px;
}

/* Button */
.button{
    display:block;
    margin:15px auto;
    padding:15px;
    background:#d4af37;
    color:white;
    text-decoration:none;
    border-radius:40px;
    transition:0.3s;
    font-weight:bold;
}

.button:hover{
    background:#b8962e;
    transform:scale(1.05);
}

/* Music icon */
.music-toggle{
    position:fixed;
    top:20px;
    right:20px;
    width:45px;
    height:45px;
    border-radius:50%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:20px;
    backdrop-filter:blur(6px);
}

/* Fade animation */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* Falling petals */
.flower{
    position:fixed;
    top:-10px;
    width:14px;
    height:14px;
    background:pink;
    border-radius:50%;
    opacity:0.7;
    animation:fall linear infinite;
}

@keyframes fall{
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="overlay">
    <h2>💍 Wedding Invitation 💍</h2>

    <a class="button" href="LINK_CANVA" target="_blank">📩 Xem Thiệp Cưới</a>
    <a class="button" href="LINK_ALBUM" target="_blank">📷 Album Ảnh</a>
    <a class="button" href="LINK_PHOTOBOOTH" target="_blank">🎉 Photobooth</a>
    <a class="button" href="LINK_DRIVE_UPLOAD" target="_blank">📤 Gửi Ảnh Lên Drive</a>
</div>

<div class="music-toggle" id="musicToggle">🔊</div>

<audio id="bgMusic" autoplay loop muted playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");
const toggle = document.getElementById("musicToggle");

/* Autoplay muted trước */
window.addEventListener("load", () => {
    music.volume = 0;
    music.play().then(() => {
        setTimeout(() => {
            fadeInMusic();
        },1500);
    }).catch(()=>{});
});

/* Fade in âm lượng */
function fadeInMusic(){
    music.muted = false;
    let vol = 0;
    const fade = setInterval(()=>{
        if(vol < 1){
            vol += 0.05;
            music.volume = vol;
        }else{
            clearInterval(fade);
        }
    },200);
}

/* Kích hoạt nếu bị chặn */
function activate(){
    music.muted = false;
    music.play();
    fadeInMusic();
    document.removeEventListener("click",activate);
    document.removeEventListener("scroll",activate);
}

document.addEventListener("click",activate);
document.addEventListener("scroll",activate);

/* Toggle bật/tắt */
toggle.addEventListener("click",()=>{
    if(music.paused){
        music.play();
        toggle.innerHTML="🔊";
    }else{
        music.pause();
        toggle.innerHTML="🔈";
    }
});

/* Petals */
function createFlower(){
    const flower=document.createElement("div");
    flower.classList.add("flower");
    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(flower);
    setTimeout(()=>{flower.remove();},10000);
}
setInterval(createFlower,500);
</script>

</body>
</html>
