<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Segoe UI, sans-serif;
    height:100vh;
    background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:420px;
    backdrop-filter:blur(8px);
    animation:fadeIn 2s ease;
}

.overlay h2{
    margin-bottom:25px;
    font-size:26px;
}

.button{
    display:block;
    margin:15px auto;
    padding:14px;
    background:#d4af37;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
    font-weight:bold;
}

.button:hover{
    background:#b8962e;
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* Hoa rơi */
.flower{
    position:fixed;
    top:-10px;
    width:15px;
    height:15px;
    background:pink;
    border-radius:50%;
    opacity:0.7;
    animation:fall linear infinite;
}

@keyframes fall{
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="overlay">
    <h2>💍 Wedding Invitation 💍</h2>

    <a class="button" href="LINK_CANVA" target="_blank">📩 Xem Thiệp Cưới</a>
    <a class="button" href="LINK_ALBUM" target="_blank">📷 Album Ảnh</a>
    <a class="button" href="LINK_PHOTOBOOTH" target="_blank">🎉 Photobooth</a>
    <a class="button" href="LINK_DRIVE_UPLOAD" target="_blank">📤 Gửi Ảnh Lên Drive</a>
</div>

<!-- NHẠC -->
<audio id="bgMusic" autoplay loop playsinline muted>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

/* Bước 1: cố autoplay muted */
window.addEventListener("load", () => {
    music.play().then(() => {
        setTimeout(() => {
            music.muted = false; // tự bật tiếng sau 1s
        }, 1000);
    }).catch(() => {
        console.log("Autoplay bị chặn");
    });
});

/* Bước 2: nếu bị chặn thì kích hoạt khi người dùng chạm */
function activateMusic(){
    music.muted = false;
    music.play();
    document.removeEventListener("click", activateMusic);
    document.removeEventListener("touchstart", activateMusic);
}

document.addEventListener("click", activateMusic);
document.addEventListener("touchstart", activateMusic);

/* Hoa rơi */
function createFlower(){
    const flower=document.createElement("div");
    flower.classList.add("flower");
    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(flower);
    setTimeout(()=>{flower.remove();},10000);
}
setInterval(createFlower,500);
</script>

</body>
</html>
