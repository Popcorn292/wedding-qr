<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    backdrop-filter: blur(8px);
    width: 90%;
    max-width: 400px;
}

h1 {
    font-size: 28px;
    margin-bottom: 30px;
}

.button {
    display: block;
    margin: 15px auto;
    padding: 14px;
    width: 100%;
    background: #d4af37;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-size: 18px;
    transition: 0.3s;
}

.button:hover {
    background: #b8962e;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="overlay">
    <h1>💍 Wedding Invitation 💍</h1>

    <a class="button" href="LINK_CANVA" target="_blank">📩 Xem Thiệp Cưới</a>
    <a class="button" href="LINK_ALBUM" target="_blank">📷 Album Ảnh</a>
    <a class="button" href="LINK_PHOTOBOOTH" target="_blank">🎉 Photobooth</a>
    <a class="button" href="LINK_DRIVE_UPLOAD" target="_blank">📤 Gửi Ảnh Lên Drive</a>
</div>

<!-- NHẠC -->
<audio id="bgMusic" autoplay loop playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const audio = document.getElementById("bgMusic");

    const playAudio = () => {
        audio.play().catch(() => {
            document.addEventListener("click", function() {
                audio.play();
            }, { once: true });
        });
    };

    playAudio();
});
</script>

</body>
</html>
